<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetCode Pattern Buckets</title>
  </head>
  <body>
    <script>
      const path = window.location.pathname;
      const basePath = '/leetcode-patterns';
      if (path.startsWith(basePath)) {
        window.location.replace(basePath + '/#' + path.slice(basePath.length));
      } else {
        window.location.replace('/');
      }
    </script>
  </body>
</html>
